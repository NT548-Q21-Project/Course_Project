name: API Gateway CI

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "backend/services/api-gateway/**"
      - "docker-compose.yml"
      - ".github/workflows/api-gateway-ci.yml"

  pull_request:
    branches:
      - main
      - develop
    paths:
      - "backend/services/api-gateway/**"
      - "docker-compose.yml"
      - ".github/workflows/api-gateway-ci.yml"

  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  SERVICE_PATH: backend/services/api-gateway
  IMAGE_NAME: api-gateway
  IMAGE_TAG: ${{ github.sha }}

  JWT_SECRET_KEY: test-secret
  JWT_ALGORITHM: HS256

  IDENTITY_SERVICE_URL: http://identity-service:8001
  RECRUITMENT_SERVICE_URL: http://recruitment-service:8002
  AI_SERVICE_URL: http://ai-service:8003

  AWS_REGION: ap-southeast-1
  AWS_ACCOUNT_ID: 832388983718

jobs:
  quality-and-test:
    name: Quality and Test
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash
        working-directory: ${{ env.SERVICE_PATH }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.5.31"
          enable-cache: true
          cache-dependency-glob: "${{ env.SERVICE_PATH }}/pyproject.toml"

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: make ci-install

      - name: Run quality checks
        run: make check

      - name: Run tests
        run: make test

  docker-build:
    name: Docker Build and Push
    runs-on: ubuntu-latest
    needs: quality-and-test

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push api-gateway image to ECR
        uses: docker/build-push-action@v6
        with:
          context: ./backend/services/api-gateway
          file: ./backend/services/api-gateway/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha,scope=api-gateway
          cache-to: type=gha,mode=max,scope=api-gateway
