name: API Gateway CI

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "backend/services/api-gateway/**"
      - "docker-compose.yml"
      - ".github/workflows/api-gateway-ci.yml"

  pull_request:
    branches:
      - main
      - develop
    paths:
      - "backend/services/api-gateway/**"
      - "docker-compose.yml"
      - ".github/workflows/api-gateway-ci.yml"

  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  SERVICE_PATH: backend/services/api-gateway
  IMAGE_NAME: aimatch-api-gateway
  IMAGE_TAG: ${{ github.sha }}

  JWT_SECRET_KEY: test-secret
  JWT_ALGORITHM: HS256

  IDENTITY_SERVICE_URL: http://identity-service:8001
  RECRUITMENT_SERVICE_URL: http://recruitment-service:8002
  AI_SERVICE_URL: http://ai-service:8003

jobs:
  quality-and-test:
    name: Quality and Test
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash
        working-directory: ${{ env.SERVICE_PATH }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.5.31"
          enable-cache: true
          cache-dependency-glob: "${{ env.SERVICE_PATH }}/pyproject.toml"

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: make ci-install

      - name: Run quality checks
        run: make check

      - name: Run tests
        run: make test

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: quality-and-test

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build api-gateway image
        uses: docker/build-push-action@v6
        with:
          context: ./backend/services/api-gateway
          file: ./backend/services/api-gateway/Dockerfile
          push: false
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha,scope=api-gateway
          cache-to: type=gha,mode=max,scope=api-gateway
