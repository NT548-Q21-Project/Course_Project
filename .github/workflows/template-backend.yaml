name: Test, Check For Vulnerabilities, Build and Push Docker Image

on:
  workflow_call:
    inputs:
      python_version:
        type: string
        required: false
        default: "3.12"
      service_path:
        type: string
        required: true
      image_name:
        type: string
        required: true
      image_tag:
        type: string
        required: true
      cache_dependency_glob:
        type: string
        required: true
      aws_region:
        type: string
        required: false
        default: "ap-southeast-1"
      aws_account_id:
        type: string
        required: false
        default: ""
      overlay_env:
        type: string
        required: false
        default: ""

      app_name:
        type: string
        required: false
        default: ""
      app_env:
        type: string
        required: false
        default: ""
      database_url:
        type: string
        required: false
        default: ""
      llm_base_url:
        type: string
        required: false
        default: ""
      llm_api_key:
        type: string
        required: false
        default: ""
      llm_model:
        type: string
        required: false
        default: ""
      llm_timeout_seconds:
        type: string
        required: false
        default: ""
      jwt_secret_key:
        type: string
        required: false
        default: ""
      jwt_algorithm:
        type: string
        required: false
        default: ""
      identity_service_url:
        type: string
        required: false
        default: ""
      recruitment_service_url:
        type: string
        required: false
        default: ""
      ai_service_url:
        type: string
        required: false
        default: ""

      postgres_port:
        type: string
        required: false
        default: "5432"
      postgres_db:
        type: string
        required: false
        default: "aimatch_test_db"
      postgres_user:
        type: string
        required: false
        default: "postgres"
      postgres_password:
        type: string
        required: false
        default: "postgres"
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true

permissions:
  contents: read

env:
  PYTHON_VERSION: ${{ inputs.python_version }}
  SERVICE_PATH: ${{ inputs.service_path }}
  IMAGE_NAME: ${{ inputs.image_name }}
  IMAGE_TAG: ${{ inputs.image_tag }}
  AWS_REGION: ${{ inputs.aws_region }}
  AWS_ACCOUNT_ID: ${{ inputs.aws_account_id }}

jobs:
  quality-and-test:
    name: Quality and Test
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash
        working-directory: ${{ env.SERVICE_PATH }}

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ${{ inputs.postgres_user }}
          POSTGRES_PASSWORD: ${{ inputs.postgres_password }}
          POSTGRES_DB: ${{ inputs.postgres_db }}
        ports:
          - ${{ inputs.postgres_port }}:5432
        options: >-
          --health-cmd "pg_isready -U ${{ inputs.postgres_user }} -d ${{ inputs.postgres_db }}"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.5.31"
          enable-cache: true
          cache-dependency-glob: ${{ inputs.cache_dependency_glob }}

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Export service environment
        run: |
          if [[ -n "${{ inputs.app_name }}" ]]; then echo "APP_NAME=${{ inputs.app_name }}" >> "$GITHUB_ENV"; fi
          if [[ -n "${{ inputs.app_env }}" ]]; then echo "APP_ENV=${{ inputs.app_env }}" >> "$GITHUB_ENV"; fi
          if [[ -n "${{ inputs.database_url }}" ]]; then echo "DATABASE_URL=${{ inputs.database_url }}" >> "$GITHUB_ENV"; fi
          if [[ -n "${{ inputs.llm_base_url }}" ]]; then echo "LLM_BASE_URL=${{ inputs.llm_base_url }}" >> "$GITHUB_ENV"; fi
          if [[ -n "${{ inputs.llm_api_key }}" ]]; then echo "LLM_API_KEY=${{ inputs.llm_api_key }}" >> "$GITHUB_ENV"; fi
          if [[ -n "${{ inputs.llm_model }}" ]]; then echo "LLM_MODEL=${{ inputs.llm_model }}" >> "$GITHUB_ENV"; fi
          if [[ -n "${{ inputs.llm_timeout_seconds }}" ]]; then echo "LLM_TIMEOUT_SECONDS=${{ inputs.llm_timeout_seconds }}" >> "$GITHUB_ENV"; fi
          if [[ -n "${{ inputs.jwt_secret_key }}" ]]; then echo "JWT_SECRET_KEY=${{ inputs.jwt_secret_key }}" >> "$GITHUB_ENV"; fi
          if [[ -n "${{ inputs.jwt_algorithm }}" ]]; then echo "JWT_ALGORITHM=${{ inputs.jwt_algorithm }}" >> "$GITHUB_ENV"; fi
          if [[ -n "${{ inputs.identity_service_url }}" ]]; then echo "IDENTITY_SERVICE_URL=${{ inputs.identity_service_url }}" >> "$GITHUB_ENV"; fi
          if [[ -n "${{ inputs.recruitment_service_url }}" ]]; then echo "RECRUITMENT_SERVICE_URL=${{ inputs.recruitment_service_url }}" >> "$GITHUB_ENV"; fi
          if [[ -n "${{ inputs.ai_service_url }}" ]]; then echo "AI_SERVICE_URL=${{ inputs.ai_service_url }}" >> "$GITHUB_ENV"; fi

      - name: Install dependencies
        run: make ci-install

      - name: Run quality checks
        run: make check

      - name: Run tests
        run: make test

  trivy-vulnebility-scan:
    name: Trivy Vulnerability Scan
    runs-on: ubuntu-latest
    needs: quality-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

  docker-build:
    name: Docker Build and Push
    runs-on: ubuntu-latest
    needs: trivy-vulnebility-scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image to ECR
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.SERVICE_PATH }}
          file: ${{ env.SERVICE_PATH }}/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha,scope=${{ env.IMAGE_NAME }}
          cache-to: type=gha,mode=max,scope=${{ env.IMAGE_NAME }}

  update-kustomize-version:
    name: Update Kustomize Version
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    
    concurrency:
      group: update-kustomize-${{ github.event.pull_request.number || github.ref_name }}
      queue: max

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref || github.ref }}

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Update overlay version
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          AWS_REGION: ${{ env.AWS_REGION }}
          AWS_ACCOUNT_ID: ${{ env.AWS_ACCOUNT_ID }}
          OVERLAY_ENV: ${{ inputs.overlay_env }}
        run: |
          set -euo pipefail

          SOURCE_BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          TARGET_BRANCH="${GITHUB_BASE_REF:-${GITHUB_REF_NAME}}"

          echo "Source branch: ${SOURCE_BRANCH}"
          echo "Target branch: ${TARGET_BRANCH}"

          if [[ -n "${OVERLAY_ENV}" ]]; then
            ENV_DIR="${OVERLAY_ENV}"
          else
            case "${TARGET_BRANCH}" in
              main)
                ENV_DIR="prod"
                ;;
              develop|stage)
                ENV_DIR="stage"
                ;;
              *)
                echo "Skip overlay update for branch ${TARGET_BRANCH}" >&2
                exit 0
                ;;
            esac
          fi

          VERSION_FILE="infra/k8s-spec/overlays/${ENV_DIR}/version-${IMAGE_NAME}.yml"
          IMAGE_REF="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${IMAGE_NAME}:${IMAGE_TAG}"

          export IMAGE_REF
          echo "Image ref: ${IMAGE_REF}"

          yq e -i '
            (select(.kind == "Deployment" and .metadata.name == strenv(IMAGE_NAME))
              .spec.template.spec.containers[] | select(.name == strenv(IMAGE_NAME)).image) = strenv(IMAGE_REF)
          ' "${VERSION_FILE}"

          if git diff --quiet "${VERSION_FILE}"; then
            echo "No changes to commit"
            exit 0
          fi

          TARGET_BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add "${VERSION_FILE}"
          git commit -m "chore(kustomize): update ${IMAGE_NAME} to ${IMAGE_TAG} [skip ci]"
          git pull --rebase origin "${SOURCE_BRANCH}"
          git push origin HEAD:"${TARGET_BRANCH}"