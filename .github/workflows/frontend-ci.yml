name: Frontend CI

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"

  pull_request:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  frontend-ci:
    uses: ./.github/workflows/template-frontend.yaml
    secrets: inherit
    with:
      service_path: frontend
      image_name: frontend
      image_tag: ${{ github.sha }}
      aws_region: ap-southeast-1
      aws_account_id: "832388983718"
