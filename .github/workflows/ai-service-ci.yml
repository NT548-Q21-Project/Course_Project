name: AI Service CI

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "backend/services/ai-service/**"
      - "docker-compose.yml"
      - ".github/workflows/ai-service-ci.yml"

  pull_request:
    branches:
      - main
      - develop
    paths:
      - "backend/services/ai-service/**"
      - "docker-compose.yml"
      - ".github/workflows/ai-service-ci.yml"

  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  SERVICE_PATH: backend/services/ai-service
  IMAGE_NAME: aimatch-ai-service
  IMAGE_TAG: ${{ github.sha }}

  APP_NAME: AIMatch AI Service
  APP_ENV: test

  DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5433/aimatch_test_db
  TEST_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5433/aimatch_test_db

  LLM_BASE_URL: https://example.com/v1
  LLM_API_KEY: test-key
  LLM_MODEL: test-model
  LLM_TIMEOUT_SECONDS: "10"

jobs:
  quality-and-test:
    name: Quality and Test
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash
        working-directory: ${{ env.SERVICE_PATH }}

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: aimatch_test_db
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d aimatch_test_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.5.31"
          enable-cache: true
          cache-dependency-glob: "${{ env.SERVICE_PATH }}/uv.lock"

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: make ci-install

      - name: Run quality checks
        run: make check

      - name: Run tests
        run: make test

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: quality-and-test

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ai-service image
        uses: docker/build-push-action@v6
        with:
          context: ./backend/services/ai-service
          file: ./backend/services/ai-service/Dockerfile
          push: false
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha,scope=ai-service
          cache-to: type=gha,mode=max,scope=ai-service
