name: AI Service CI

on:
  push:
    branches:
      - main
      - stage
    paths:
      - "backend/services/ai-service/**"
      - ".github/workflows/ai-service-ci.yml"
      - ".github/workflows/template-backend.yaml"

  pull_request:
    branches:
      - main
      - stage
    paths:
      - "backend/services/ai-service/**"
      - ".github/workflows/ai-service-ci.yml"
      - ".github/workflows/template-backend.yaml"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  ai-service-ci:
    uses: ./.github/workflows/template-backend.yaml
    secrets: inherit
    with:
      service_path: backend/services/ai-service
      image_name: ai-service
      image_tag: ${{ github.event.pull_request.head.sha || github.sha }}
      cache_dependency_glob: backend/services/ai-service/uv.lock
      aws_region: ap-southeast-1
      aws_account_id: "832388983718"
      app_name: AIMatch AI Service
      database_url: postgresql+psycopg://postgres:postgres@localhost:5433/aimatch_test_db
      llm_base_url: https://example.com/v1
      llm_api_key: test-key
      llm_model: test-model
      llm_timeout_seconds: "10"
      postgres_port: "5433"
