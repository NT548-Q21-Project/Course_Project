apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: api-gateway-secret
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: api-gateway-secret
  data:
    - secretKey: JWT_SECRET_KEY
      remoteRef:
        key: jwt-secret
        property: JWT_SECRET_KEY
