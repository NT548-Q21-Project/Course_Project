apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: recruitment-service-secret
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: recruitment-service-secret
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: recruitment-db
        property: DATABASE_URL
