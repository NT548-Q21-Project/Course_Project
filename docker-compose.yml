services:
  postgres:
    image: postgres:16
    container_name: aimatch-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aimatch_db
    ports:
      - "5432:5432"
    volumes:
      - aimatch_postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aimatch_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-test:
    image: postgres:16
    container_name: aimatch-postgres-test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aimatch_test_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aimatch_test_db"]
      interval: 5s
      timeout: 5s
      retries: 5
  identity-service:
    build:
      context: ./backend/services/identity-service
      dockerfile: Dockerfile
    image: aimatch-identity-service
    container_name: aimatch-identity-service
    env_file:
      - ./backend/services/identity-service/.env
    depends_on:
      postgres:
        condition: service_healthy

  recruitment-service:
    build:
      context: ./backend/services/recruitment-service
      dockerfile: Dockerfile
    image: aimatch-recruitment-service
    container_name: aimatch-recruitment-service
    env_file:
      - ./backend/services/recruitment-service/.env
    depends_on:
      postgres:
        condition: service_healthy

  api-gateway:
    build:
      context: ./backend/services/api-gateway
      dockerfile: Dockerfile
    image: aimatch-api-gateway
    container_name: aimatch-api-gateway
    env_file:
      - ./backend/services/api-gateway/.env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      identity-service:
        condition: service_started
      recruitment-service:
        condition: service_started
  
  ai-service:
    build:
      context: ./backend/services/ai-service
      dockerfile: Dockerfile
    image: aimatch-ai-service
    container_name: aimatch-ai-service
    env_file:
      - ./backend/services/ai-service/.env
    ports:
      - "8001:8003"
    depends_on:
      postgres:
        condition: service_healthy
  
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - ai-service

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SMTP_ENABLED=true
      - GF_SMTP_HOST=smtp.gmail.com:587
      - GF_SMTP_USER=taquoctuan01102005@gmail.com
      - GF_SMTP_PASSWORD=kygb ktaf moxe ufdz
      - GF_SMTP_FROM_ADDRESS=taquoctuan01102005@gmail.com
      - GF_SMTP_FROM_NAME=Grafana-Monitoring-UIT
    volumes:
      - grafana-storage:/var/lib/grafana
    depends_on:
      - prometheus

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: aimatch-frontend
    container_name: aimatch-frontend
    volumes:
      - frontend_dist:/app/dist

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    image: aimatch-nginx
    container_name: aimatch-nginx
    ports:
      - "80:80"
    volumes:
      - frontend_dist:/var/www/html
    depends_on:
      frontend:
        condition: service_started

volumes:
  aimatch_postgres_data:
  postgres_test_data:
  frontend_dist:
  grafana-storage:


