repos:
  - repo: local
    hooks:
      - id: identity-service-format
        name: identity-service format
        entry: bash -c 'cd backend/services/identity-service && make format'
        language: system
        pass_filenames: false
        files: ^backend/services/identity-service/(app|tests)/.*\.py$

      - id: identity-service-check
        name: identity-service check
        entry: bash -c 'cd backend/services/identity-service && make check'
        language: system
        pass_filenames: false
        files: ^backend/services/identity-service/(app|tests)/.*\.py$

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-added-large-files
